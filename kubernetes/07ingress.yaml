apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wanderlust-ingress
  namespace: wanderlust
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "gke-nginx-global-ip"
spec:
  #ingressClassName: gce
  defaultBackend:
    service:
      name: frontend-service
      port:
        number: 80
  rules:
    - http:
          # ---------------------------------------------------------------
          # BACKEND DEVS, PAY ATTENTION (yes, you too):
          #
          # All backend routes in server.js (or app.js, index.js, whatever
          # you decided to name it at 2am) MUST be prefixed with /api
          #
          # ✅ app.get('/api/users', ...)
          # ✅ app.post('/api/auth/login', ...)
          # ❌ app.get('/users', ...)  → goes to frontend, enjoy the 404
          #
          # Also, expose a health-check endpoint at exactly GET "/"
          # (base path, no /api prefix) so the cluster knows you're alive.
          # Something like:
          #   app.get('/', (req, res) => res.status(200).send('OK'))
          # Without this, the load balancer assumes you're dead.
          # (Honestly, fair assumption at 2am, but still.)
          # ---------------------------------------------------------------
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          
          
